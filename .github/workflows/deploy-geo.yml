name: Deploy Geo Demo

on:
  push:
    branches: [main]
    paths:
      - "apps/geo/**"
      - "demo/norwegian-geo/core/data/**"
      - "demo/norwegian-geo/modules/**/data/**"
      - "demo/norwegian-geo/core/historical/data/**"
      - ".github/workflows/deploy-geo.yml"
      - "docs/DEPLOYMENT.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-geo
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: apps/geo
        run: bun install --frozen-lockfile

      - name: Build (373 pages)
        working-directory: apps/geo
        env:
          ASTRO_SITE: https://aprestmo.github.io
          ASTRO_BASE: /aurii/
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/geo/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
