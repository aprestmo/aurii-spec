id: county
name: County
description: Norwegian administrative county (fylke) from Kartverket/GeoNorge
version: 2
fields:
  - name: id
    type: string
    required: true
    label: County number (fylkesnummer)
    description: Two-digit Norwegian county identifier, e.g. "03" for Oslo

  - name: name
    type: string
    required: true
    label: County name (fylkesnavn)

  - name: population
    type: number
    label: Population (innbyggere)
    description: Sum of municipality populations in the county (SSB Statbank table 07459)

  - name: populationYear
    type: number
    label: Population reference year
    description: Year of the population figures from SSB

  - name: source
    type: string
    label: Data source
